kind = "web"
previewPath = "/"
title = "ClaudeLearn"
version = "1.0.0"
id = "artifacts/claudelearn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21351

[services.development]
run = "pnpm --filter @workspace/claudelearn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/claudelearn", "run", "build" ]
publicDir = "artifacts/claudelearn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21351"
BASE_PATH = "/"
